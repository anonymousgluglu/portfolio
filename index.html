<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio — Lucas Réal</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #1d1d1f;
      --text-muted: #6e6e73;
      --blue: #0071e3;
      --border-light: #e8e8ed;
      --gray-bg: #fafafa;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    /* Styles Mode Sombre */
    body.dark {
      --bg: #0d0d0f;
      --text: #f5f5f7;
      --text-muted: #a1a1a6;
      --blue: #2997ff;
      --border-light: #2a2a2e;
      --gray-bg: #1a1a1e;
    }

*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}
    
    body {
      background: var(--bg); color: var(--text);
      font-family: var(--font); -webkit-font-smoothing: antialiased;
      transition: background 0.3s, color 0.3s;
    }
/* NAV CENTRÉE */
nav {
  /* Positionnement fixe */
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;

  /* Mise en page (Flexbox) */
  display: flex;
  align-items: center;
  justify-content: space-between; /* Logo à gauche, Liens à droite */
  padding: 20px 48px;

  /* Fond et Effet de transparence (Mode Clair par défaut) */
  background: rgba(245, 245, 247, 0.6); 
  backdrop-filter: blur(15px);
  -webkit-backdrop-filter: blur(15px);
  
  /* Bordure et Transition */
  border-bottom: 1px solid rgba(0, 0, 0, 0.05);
  transition: background 0.3s ease, border-color 0.3s ease;
}

        
.nav-logo {
  font-size: 15px; 
  font-weight: 800;
  letter-spacing: .12em; 
  text-transform: uppercase;
  color: var(--text); 
  text-decoration: none;
}

.nav-logo span { 
  color: var(--blue); 
}

    .nav-links { display: flex; gap: 30px; list-style: none; align-items: center; }
    .nav-links a {
      font-size: 11px; letter-spacing: .16em; text-transform: uppercase;
      color: var(--text-muted); text-decoration: none; transition: color .2s;
      font-weight: 600;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--blue); }

    #darkToggle {
      background: var(--gray-bg); border: 1px solid var(--border-light);
      color: var(--text); padding: 6px 12px; border-radius: 20px;
      cursor: pointer; font-size: 14px; transition: all 0.2s;
      margin-left: 10px;
    }
/* On garde bien la variante pour le mode sombre à part */
body.dark nav {
  background: rgba(13, 13, 15, 0.6);
  border-bottom: 1px solid rgba(255, 255, 255, 0.08);
}
    
    /* HERO SECTION */
    .hero {
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 80px 24px;
    }
    .hero-greeting {
      font-size: 16px; color: var(--text-muted); letter-spacing: .02em;
      margin-bottom: 12px; opacity: 0;
      animation: fadeUp .6s ease forwards .15s;
    }
    .hero-name {
      font-size: clamp(52px, 9vw, 100px); font-weight: 700;
      line-height: 1; letter-spacing: -.03em; color: var(--text);
      opacity: 0; animation: fadeUp .6s ease forwards .3s;
    }
    .hero-firstname {
      display: inline-block; color: var(--blue);
      animation: bounce 1.1s cubic-bezier(.36,.07,.19,.97) both 1s;
    }
    .hero-line {
      width: 36px; height: 2px; background: var(--blue);
      margin: 20px auto; opacity: 0;
      animation: fadeUp .5s ease forwards .45s;
    }
    .hero-sub {
      font-size: 11px; letter-spacing: .2em; text-transform: uppercase;
      color: var(--text-muted); margin-bottom: 44px; line-height: 2;
      opacity: 0; animation: fadeUp .6s ease forwards .55s;
    }
    .hero-sub .dot {
      display: inline-block; width: 4px; height: 4px;
      background: var(--blue); border-radius: 50%;
      vertical-align: middle; margin: 0 12px; position: relative; top: -1px;
    }

    .btn-visit {
      display: inline-flex; align-items: center; gap: 10px;
      background: var(--text); color: var(--bg); font-size: 11px;
      font-weight: 700; letter-spacing: .18em; text-transform: uppercase;
      padding: 18px 40px; text-decoration: none; border-radius: 12px;
      transition: all 0.3s ease;
      opacity: 0; animation: fadeUp .6s ease forwards .7s;
    }
    .btn-visit:hover { background: var(--blue); color: #fff; transform: translateY(-3px); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes bounce {
      0%   { transform: translateY(0); }
      20%  { transform: translateY(-20px); }
      40%  { transform: translateY(0); }
      56%  { transform: translateY(-10px); }
      70%  { transform: translateY(0); }
      82%  { transform: translateY(-5px); }
      90%  { transform: translateY(0); }
      100% { transform: translateY(0); }
    }
    /* FOOTER CENTRÉ */
    footer {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--bg); border-top: 1px solid var(--border-light);
      padding: 20px 48px; 
      display: flex; flex-direction: column; align-items: center; gap: 8px;
    }
    .footer-copy { font-size: 11px; color: var(--text-muted); letter-spacing: .05em; }
    .footer-copy span { color: var(--blue); font-weight: 600; }

    @media (max-width: 850px) {
      nav { padding: 16px 24px; }
      .nav-links { gap: 15px; }
      .nav-links a { font-size: 9px; }
      footer { position: relative; margin-top: 50px; }
    }
    html {
  overflow-y: scroll;
}
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">Lucas<span>.</span>Réal</a>
  <ul class="nav-links">
    <li><a href="index.html" class="active">Accueil</a></li>
    <li><a href="profil.html">Profil</a></li>
    <li><a href="formations.html">Formations</a></li>
    <li><a href="missions.html">Missions</a></li>
    <li><a href="veille.html">Veille Technologique</a></li>
    <li><a href="contact.html">Contact</a></li>
    <li><button id="darkToggle">🌙</button></li>
  </ul>
</nav>

<main class="hero">
  <p class="hero-greeting">Bonjour ! Je m'appelle</p>
  <h1 class="hero-name"><span class="hero-firstname">Lucas</span></span>REAL</h1>
  <div class="hero-line"></div>
  <p class="hero-sub">
    Étudiant en BTS SIO
    <span class="dot"></span>
    St Josup
    <span class="dot"></span>
    Le Havre
  </p>
  <a class="btn-visit" href="profil.html">Visiter &rarr;</a>
</main>

<footer>
  <div class="footer-copy">&copy; 2026 Lucas Réal — Portfolio BTS SIO</div>
  <div class="footer-copy">Hébergé sur <span>GitHub Pages</span></div>
</footer>

<script>
  // GESTION DU MODE SOMBRE
  const toggle = document.getElementById('darkToggle');
  
  // Vérifier la préférence stockée
  if (localStorage.getItem('darkMode') === 'on') {
    document.body.classList.add('dark');
    toggle.textContent = '☀️';
  }

  toggle.addEventListener('click', () => {
    document.body.classList.toggle('dark');
    const isDark = document.body.classList.contains('dark');
    
    // Sauvegarder la préférence
    localStorage.setItem('darkMode', isDark ? 'on' : 'off');
    
    // Changer l'icône
    toggle.textContent = isDark ? '☀️' : '🌙';
  });
</script>

</body>
</html>
